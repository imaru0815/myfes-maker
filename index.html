<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>マイフェスメーカー</title>
  <style>
*{box-sizing:border-box}html{-webkit-text-size-adjust:100%}body{margin:0;background:radial-gradient(circle at 18% 0%,rgba(239,51,51,.24),transparent 28%),radial-gradient(circle at 90% 8%,rgba(29,117,184,.22),transparent 26%),var(--page-bg,#081018);color:var(--text,#fff);font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif}body[data-template=rock]{--page-bg:#081018;--panel:#111a24;--poster-bg:#0b1118;--text:#fff;--muted:#cbd5e1;--line:#475569;--accent:#ef3333;--logo-shadow:#d51f1f}body[data-template=pop]{--page-bg:#fff4fb;--panel:#fff;--poster-bg:#fff8fc;--text:#241832;--muted:#6b5878;--line:#e3bdd8;--accent:#ff4fb8;--logo-shadow:#ffd166}body[data-template=night]{--page-bg:#050816;--panel:#0f172a;--poster-bg:#080b1f;--text:#fff;--muted:#cbd5e1;--line:#334155;--accent:#8b5cf6;--logo-shadow:#06b6d4}body[data-template=forest]{--page-bg:#f6f1df;--panel:#fbf7e8;--poster-bg:#f6f1df;--text:#1f3a2e;--muted:#52665b;--line:#9bae92;--accent:#6a994e;--logo-shadow:#d4a017}body[data-template=minimal]{--page-bg:#fff;--panel:#fff;--poster-bg:#fff;--text:#111;--muted:#666;--line:#ddd;--accent:#111;--logo-shadow:#ccc}.site-header{padding:22px 16px 12px;text-align:center}.site-header h1{margin:0;font-size:34px;font-weight:1000;letter-spacing:-.06em}.site-header p{margin:8px 0 0;color:var(--muted);font-size:14px;font-weight:800}.app{width:min(1180px,94vw);margin:0 auto 40px}.controls,.result{background:color-mix(in srgb,var(--panel) 96%,black);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:16px}details{border:1px solid color-mix(in srgb,var(--line) 70%,transparent);border-radius:12px;padding:10px;margin-bottom:12px;background:rgba(255,255,255,.035)}summary{font-weight:1000;cursor:pointer;padding:2px 0 8px}label{display:block;margin:12px 0 6px;font-size:13px;font-weight:900}input,textarea,select,button{font:inherit}input,textarea,select{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 10px;background:#fff;color:#111;font-size:16px}input[type=color]{height:42px;padding:3px}textarea{min-height:230px;line-height:1.5;resize:vertical}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.template-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.template-btn{margin:0;padding:12px 4px;font-size:12px;background:rgba(255,255,255,.08);border:1px solid var(--line)}.template-btn.active{background:var(--accent);color:#fff}button{width:100%;border:0;border-radius:12px;padding:13px 14px;background:var(--accent);color:#fff;font-size:16px;font-weight:1000;margin-top:12px;cursor:pointer;touch-action:manipulation}button.secondary{background:#263241}body[data-template=pop] button.secondary,body[data-template=forest] button.secondary,body[data-template=minimal] button.secondary{background:#e5e7eb;color:#111}.control-actions,.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.actions{grid-template-columns:1fr 1fr 1fr}.note{color:var(--muted);font-size:12px;line-height:1.6}.check{display:flex;gap:8px;align-items:center}.check input{width:auto}.stage-settings,.stage-time-settings{display:grid;gap:8px}.stage-row,.stage-time-row{display:grid;grid-template-columns:28px 1fr 56px;gap:8px;align-items:center}.stage-time-row{grid-template-columns:56px 1fr 1fr}.stage-row span,.stage-time-row span{font-weight:900;font-size:13px}.poster{background:linear-gradient(90deg,rgba(255,255,255,.055) 1px,transparent 1px),linear-gradient(180deg,rgba(255,255,255,.055) 1px,transparent 1px),var(--poster-bg);background-size:36px 36px;border:1px solid var(--line);border-radius:18px;padding:16px;color:var(--text);overflow:hidden}.poster-top{display:grid;grid-template-columns:1fr;gap:12px;border-bottom:2px solid var(--line);margin-bottom:14px;padding-bottom:14px}.poster-logo{text-align:center;font-size:clamp(42px,13vw,86px);line-height:.82;font-weight:1000;letter-spacing:-.08em;text-transform:uppercase;color:var(--text);text-shadow:3px 3px 0 var(--logo-shadow);white-space:pre-line;padding:18px 0 8px}.poster-subtitle{text-align:center;color:var(--muted);font-size:16px;font-weight:800}.poster-meta{text-align:center;font-size:15px;font-weight:900;line-height:1.5}.stages{display:grid;grid-template-columns:repeat(var(--stage-count,3),minmax(0,1fr));gap:5px}.stage{min-width:0;border:1px solid var(--line);background:rgba(255,255,255,.035)}.stage-head{color:#fff;text-align:center;font-weight:1000;font-size:11px;line-height:1.15;padding:8px 3px;min-height:46px}.stage-time{display:block;font-size:10px;opacity:.9;margin-top:3px}.slot{margin:5px;padding:7px 5px 24px;border:1px solid rgba(255,255,255,.55);border-radius:8px;color:#fff;position:relative;min-height:86px;cursor:pointer}.slot-time{font-size:10px;font-weight:900;margin-bottom:5px;white-space:nowrap}.artist{display:block;font-size:13px;line-height:1.15;font-weight:1000;word-break:break-word;overflow-wrap:anywhere}.duration{position:absolute;right:5px;bottom:5px;border:1px solid rgba(255,255,255,.7);border-radius:6px;padding:1px 4px;font-size:10px;font-weight:900;background:rgba(0,0,0,.22)}.slot-edit{display:none;gap:4px}.slot.editing .slot-view{display:none}.slot.editing .slot-edit{display:grid}.slot-edit input{padding:6px;font-size:13px;border-radius:6px}.warning{display:none;background:#331313;border:1px solid #ef4444;border-radius:10px;padding:10px;margin-top:12px;color:#fecaca;font-size:13px;font-weight:800;line-height:1.5}.warning.ok{background:#102418;border-color:#22c55e;color:#bbf7d0}.poster-footer{text-align:right;color:var(--muted);font-size:11px;font-weight:800;margin-top:14px}@media (min-width:900px){.app{display:grid;grid-template-columns:380px 1fr;gap:18px;align-items:start}.controls{position:sticky;top:12px;max-height:calc(100vh - 24px);overflow:auto}.poster-top{grid-template-columns:1fr 220px;align-items:center}.poster-meta{text-align:right;font-size:18px}.stage-head{font-size:18px}.stage-time{font-size:13px}.slot{padding:12px 10px 30px;min-height:100px}.slot-time{font-size:13px}.artist{font-size:20px}.duration{font-size:12px}}body.export-x #poster{width:1080px;min-height:1350px;border-radius:0;padding:42px}body.export-x .poster-logo{font-size:112px}body.export-x .poster-subtitle{font-size:30px}body.export-x .poster-meta{font-size:28px}body.export-x .stage-head{font-size:26px;padding:16px 8px}body.export-x .stage-time{font-size:18px}body.export-x .slot{margin:10px;padding:16px 14px 40px;min-height:122px}body.export-x .slot-time{font-size:18px}body.export-x .artist{font-size:28px}body.export-x .duration{font-size:17px;right:12px;bottom:10px}
</style>
</head>
<body data-template="rock">
  <header class="site-header">
    <h1>マイフェスメーカー</h1>
    <p>好きなアーティストで、自分だけのフェスタイムテーブルを作ろう。</p>
  </header>

  <main class="app">
    <section class="controls">
      <details open>
        <summary>1. フェス情報</summary>
        <label>フェス名</label>
        <input id="festivalName" value="MBS ROCK FESTIVAL 2026" />
        <label>サブタイトル</label>
        <input id="subtitle" value="みんなでつくる、最高の一日。" />
        <div class="grid2">
          <div><label>開演</label><input id="startTime" value="11:00" /></div>
          <div><label>終演</label><input id="endTime" value="21:00" /></div>
        </div>
      </details>

      <details open>
        <summary>2. テンプレート</summary>
        <div class="template-grid">
          <button type="button" class="template-btn active" data-template="rock">ROCK</button>
          <button type="button" class="template-btn" data-template="pop">POP</button>
          <button type="button" class="template-btn" data-template="night">NIGHT</button>
          <button type="button" class="template-btn" data-template="forest">FOREST</button>
          <button type="button" class="template-btn" data-template="minimal">MINIMAL</button>
        </div>
      </details>

      <details open>
        <summary>3. ステージ設定</summary>
        <div class="grid2">
          <div><label>通常持ち時間</label><select id="duration"><option value="40">40分</option><option value="50" selected>50分</option><option value="60">60分</option></select></div>
          <div><label>転換</label><select id="changeover"><option value="20">20分</option><option value="30" selected>30分</option><option value="40">40分</option></select></div>
        </div>
        <div class="grid2">
          <div><label>最後の出演者</label><select id="lastDuration"><option value="90" selected>90分</option><option value="50">通常と同じ</option></select></div>
          <div><label>ステージ数</label><select id="stageCount"><option value="1">1</option><option value="1">1</option><option value="2">2</option><option value="3" selected>3</option><option value="4">4</option></select></div>
        </div>
        <label class="check"><input id="customStageTimes" type="checkbox" />ステージごとに時間を変更する</label>
        <div id="stageTimeSettings" class="stage-time-settings"></div>
      </details>

      <details open>
        <summary>4. ステージ名・色</summary>
        <div id="stageSettings" class="stage-settings"></div>
      </details>

      <details open>
        <summary>5. アーティスト入力</summary>
        <textarea id="artists">ONE OK ROCK
[Alexandros]
King Gnu
Vaundy
Official髭男dism
Mrs. GREEN APPLE
B'z
YOASOBI
back number
マカロニえんぴつ
サザンオールスターズ
ASIAN KUNG-FU GENERATION
04 Limited Sazabys
羊文学
Creepy Nuts</textarea>
        <p class="note">1行に1組ずつ入力してください。</p>
      </details>

      <div class="control-actions">
        <button id="generateBtn" type="button">タイムテーブル生成</button>
        <button id="shuffleBtn" type="button" class="secondary">シャッフル</button>
      </div>
    </section>

    <section class="result">
      <div id="poster" class="poster">
        <div class="poster-top">
          <div>
            <div id="posterLogo" class="poster-logo"></div>
            <div id="posterSubtitle" class="poster-subtitle"></div>
          </div>
          <div class="poster-meta">MY FES PARK<br>OPEN <span id="openOut"></span><br>START <span id="startOut"></span></div>
        </div>
        <div id="stages" class="stages"></div>
        <div id="warning" class="warning"></div>
        <div class="poster-footer">© マイフェスメーカー</div>
      </div>

      <div class="actions">
        <button id="saveBtn" type="button">画像保存</button>
        <button id="xSaveBtn" type="button">X用保存<br>1080×1350</button>
        <button id="shareBtn" type="button" class="secondary">共有</button>
      </div>
      <p class="note">iPhoneでは画像が新しいタブで開きます。長押しで保存してください。</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
const defaultStageNames=["SUN STAGE","MOON STAGE","STAR STAGE","FOREST STAGE"];const templateColors={rock:["#ef3333","#1d75b8","#198246","#784ebe"],pop:["#ff4fb8","#7c5cff","#ff9f1c","#2ec4b6"],night:["#8b5cf6","#06b6d4","#ef476f","#155e75"],forest:["#6a994e","#d4a017","#2d6a4f","#386641"],minimal:["#111111","#666666","#999999","#bbbbbb"]};let currentTemplate="rock";function $(id){return document.getElementById(id)}function parseTime(v){const p=String(v).split(":");const h=parseInt(p[0],10);const m=parseInt(p[1]||"0",10);return(Number.isNaN(h)?0:h)*60+(Number.isNaN(m)?0:m)}function fmt(min){const h=Math.floor(min/60);const m=min%60;return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")}function logoText(name){const c=String(name||"MY FES").trim();const p=c.split(/\s+/).filter(Boolean);if(p.length>=2)return p.join("\n");if(c.length>12)return c.replace(/(.{6,8})/g,"$1\n").trim();return c}function getArtists(){return $("artists").value.split("\n").map(v=>v.trim()).filter(Boolean)}function getStageCount(){return Number($("stageCount").value)}function getGlobalStart(){return $("startTime").value||"11:00"}function getGlobalEnd(){return $("endTime").value||"21:00"}function getStageName(i){const input=$(`stageName${i}`);return input?input.value||defaultStageNames[i]:defaultStageNames[i]}function getStageColor(i){const input=$(`stageColor${i}`);return input?input.value:templateColors[currentTemplate][i]}function getStageStart(i){if(!$("customStageTimes").checked)return getGlobalStart();const input=$(`stageStart${i}`);return input?input.value||getGlobalStart():getGlobalStart()}function getStageEnd(i){if(!$("customStageTimes").checked)return getGlobalEnd();const input=$(`stageEnd${i}`);return input?input.value||getGlobalEnd():getGlobalEnd()}function renderStageSettings(){const count=getStageCount();const namesBox=$("stageSettings");const timesBox=$("stageTimeSettings");const oldNames=Array.from(document.querySelectorAll(".stage-name-input")).map(el=>el.value);const oldColors=Array.from(document.querySelectorAll(".stage-color-input")).map(el=>el.value);namesBox.innerHTML="";timesBox.innerHTML="";for(let i=0;i<count;i++){const row=document.createElement("div");row.className="stage-row";row.innerHTML=`<span>${i+1}</span><input id="stageName${i}" class="stage-name-input" value="${oldNames[i]||defaultStageNames[i]}" /><input id="stageColor${i}" class="stage-color-input" type="color" value="${oldColors[i]||templateColors[currentTemplate][i]}" />`;namesBox.appendChild(row);const timeRow=document.createElement("div");timeRow.className="stage-time-row";timeRow.innerHTML=`<span>${defaultStageNames[i].replace(" STAGE","")}</span><input id="stageStart${i}" value="${getGlobalStart()}" /><input id="stageEnd${i}" value="${getGlobalEnd()}" />`;timesBox.appendChild(timeRow)}document.querySelectorAll(".stage-name-input,.stage-color-input,.stage-time-row input").forEach(el=>{el.addEventListener("input",generate);el.addEventListener("change",generate)});toggleStageTimes()}function toggleStageTimes(){$("stageTimeSettings").style.display=$("customStageTimes").checked?"grid":"none"}function setTemplate(t){currentTemplate=t;document.body.dataset.template=t;document.querySelectorAll(".template-btn").forEach(btn=>btn.classList.toggle("active",btn.dataset.template===t));for(let i=0;i<getStageCount();i++){const c=$(`stageColor${i}`);if(c)c.value=templateColors[t][i]}generate()}function escapeHtml(str){return String(str).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}function generate(){$("posterLogo").textContent=logoText($("festivalName").value);$("posterSubtitle").textContent=$("subtitle").value||"";$("openOut").textContent=getGlobalStart();$("startOut").textContent=getGlobalStart();const count=getStageCount();const normal=Number($("duration").value);const change=Number($("changeover").value);const last=Number($("lastDuration").value);const grouped=Array.from({length:count},()=>[]);getArtists().forEach((artist,index)=>grouped[index%count].push(artist));const stages=$("stages");stages.innerHTML="";stages.style.setProperty("--stage-count",count);const warnings=[];grouped.forEach((list,stageIndex)=>{const sText=getStageStart(stageIndex);const eText=getStageEnd(stageIndex);const s=parseTime(sText);const e=parseTime(eText);const color=getStageColor(stageIndex);const stage=document.createElement("div");stage.className="stage";const head=document.createElement("div");head.className="stage-head";head.style.backgroundColor=color;head.innerHTML=`${escapeHtml(getStageName(stageIndex))}<span class="stage-time">${sText}〜${eText}</span>`;stage.appendChild(head);list.forEach((name,artistIndex)=>{const isLast=artistIndex===list.length-1;const dur=isLast?last:normal;const start=s+artistIndex*(normal+change);const end=start+dur;if(end>e)warnings.push(`${getStageName(stageIndex)}：${name} が終演時間を超えています`);const slot=document.createElement("div");slot.className="slot";slot.style.backgroundColor=color;slot.innerHTML=`<div class="slot-view"><div class="slot-time">${fmt(start)} - ${fmt(end)}</div><div class="artist">${escapeHtml(name)}</div><div class="duration">${dur}分</div></div><div class="slot-edit"><input class="edit-start" value="${fmt(start)}" /><input class="edit-end" value="${fmt(end)}" /><input class="edit-name" value="${escapeHtml(name)}" /></div>`;slot.addEventListener("click",ev=>{if(ev.target.tagName==="INPUT")return;slot.classList.toggle("editing")});slot.querySelectorAll("input").forEach(input=>{input.addEventListener("input",()=>syncSlot(slot));input.addEventListener("click",ev=>ev.stopPropagation())});stage.appendChild(slot)});const capacity=Math.floor(((e-s)+change)/(normal+change));if(list.length>Math.max(1,capacity))warnings.push(`${getStageName(stageIndex)}：出演者数が多すぎて入りません`);stages.appendChild(stage)});renderWarnings(warnings)}function syncSlot(slot){const start=slot.querySelector(".edit-start").value;const end=slot.querySelector(".edit-end").value;const name=slot.querySelector(".edit-name").value;const dur=parseTime(end)-parseTime(start);slot.querySelector(".slot-time").textContent=`${start} - ${end}`;slot.querySelector(".artist").textContent=name;if(dur>0)slot.querySelector(".duration").textContent=`${dur}分`}function renderWarnings(warnings){const w=$("warning");w.style.display="block";if(warnings.length){w.className="warning";w.innerHTML=`⚠ 出演者数が多すぎて入りません。<br>${warnings.join("<br>")}`}else{w.className="warning ok";w.textContent="✓ 終演時間内に収まっています"}}function shuffleArtists(){const values=getArtists();for(let i=values.length-1;i>0;i--){const r=Math.floor(Math.random()*(i+1));[values[i],values[r]]=[values[r],values[i]]}$("artists").value=values.join("\n");generate()}async function makeBlob(mode="normal"){const old=document.body.className;if(mode==="x")document.body.classList.add("export-x");const canvas=await html2canvas($("poster"),{scale:2,backgroundColor:getComputedStyle(document.body).getPropertyValue("--poster-bg")||"#0b1118"});document.body.className=old;return await new Promise(resolve=>canvas.toBlob(resolve,"image/png"))}async function saveImage(mode="normal"){const blob=await makeBlob(mode);const url=URL.createObjectURL(blob);const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==="MacIntel"&&navigator.maxTouchPoints>1);if(isIOS){window.open(url,"_blank");alert("画像が開いたら、長押しして写真に保存してください。");return}const a=document.createElement("a");a.href=url;a.download=mode==="x"?"myfes_x_1080x1350.png":"myfes.png";document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000)}async function shareImage(){const blob=await makeBlob("normal");const file=new File([blob],"myfes.png",{type:"image/png"});if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:"マイフェスメーカー",text:"自分だけのフェスタイムテーブルを作りました。"});return}const url=URL.createObjectURL(blob);window.open(url,"_blank");alert("画像が開いたら、長押しして保存・共有してください。")}document.addEventListener("DOMContentLoaded",()=>{renderStageSettings();["festivalName","subtitle","startTime","endTime","duration","changeover","lastDuration","artists"].forEach(id=>{$(id).addEventListener("input",generate);$(id).addEventListener("change",generate)});$("stageCount").addEventListener("change",()=>{renderStageSettings();generate()});$("customStageTimes").addEventListener("change",()=>{toggleStageTimes();generate()});document.querySelectorAll(".template-btn").forEach(btn=>btn.addEventListener("click",()=>setTemplate(btn.dataset.template)));$("generateBtn").addEventListener("click",generate);$("shuffleBtn").addEventListener("click",shuffleArtists);$("saveBtn").addEventListener("click",()=>saveImage("normal"));$("xSaveBtn").addEventListener("click",()=>saveImage("x"));$("shareBtn").addEventListener("click",shareImage);generate()});
  </script>
</body>
</html>
